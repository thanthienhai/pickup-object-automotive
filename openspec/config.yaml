schema: spec-driven

# Project context
# Defines AI's understanding of the technology stack and deployment constraints.
context: |
  Technology Stack:
    - Object Detection: Ultralytics YOLO11
    - Hardware Target: Raspberry Pi 5 (CPU Only)
    - Optimization Format: NCNN (preferred), FP16 precision
    - Input: USB Camera (/dev/video0)
    - Operating System: Raspberry Pi OS (Bookworm)
    - Performance Goal: 10-15 FPS at 320px image size

# Program definitions and execution steps
programs:
  - id: training_pipeline
    name: "Training & Model Export"
    environment: "Compute/Cloud GPU"
    steps:
      - name: "Install dependencies"
        command: "pip install ultralytics"
      - name: "Train YOLO11n"
        command: "yolo task=detect mode=train data=custom_dataset.yaml model=yolo11n.pt epochs=100 imgsz=320 batch=16"
        notes: "Best model saved to runs/detect/train/weights/best.pt"
      - name: "Export to NCNN"
        command: "yolo export model=runs/detect/train/weights/best.pt format=ncnn half=True"
        notes: "Outputs best_ncnn_model folder for deployment"

  - id: raspberry_pi_setup
    name: "Environment Initialization"
    environment: "Raspberry Pi 5"
    steps:
      - name: "System Update & Venv setup"
        commands:
          - "sudo apt update && sudo apt full-upgrade -y"
          - "python3 -m venv yolovenv"
          - "source yolovenv/bin/activate"
          - "pip install ultralytics opencv-python"

  - id: deployment_inference
    name: "Inference Deployment"
    environment: "Raspberry Pi 5"
    steps:
      - name: "CLI Performance Test"
        command: "yolo predict model=path/to/best_ncnn_model source=0 imgsz=320 stream_buffer=False vid_stride=2 show=True"
      - name: "Custom Python Script (detect_usb.py)"
        command: "python detect_usb.py"
        description: "Optimized script for industrial use with real-time frame dropping"
